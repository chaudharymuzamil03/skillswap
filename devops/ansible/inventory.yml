# devops/ansible/inventory.yml
all:
  hosts:
    skillswap-server:
      ansible_host: "{{ ec2_ip }}"
      ansible_user: ubuntu
      ansible_ssh_private_key_file: "{{ ssh_key_path }}"
  vars:
    app_name: skillswap
    app_version: v1.0.0
    app_port: 5000
    node_version: 18
    docker_compose_version: 2.20.0