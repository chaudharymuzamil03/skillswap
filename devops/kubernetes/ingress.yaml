# devops/kubernetes/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skillswap-ingress
  namespace: skillswap
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: skillswap.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: skillswap-backend
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: skillswap-frontend
            port:
              number: 80