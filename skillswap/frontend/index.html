<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    
    <!-- Bootstrap CSS for mobile responsiveness -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome for icons (optional but helpful) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon - Using your background image -->
    <link rel="icon" href="/images/img%203.jpg" type="image/jpeg">
    
    <!-- For browsers that prefer ICO format -->
    <link rel="alternate icon" href="/favicon.ico" type="image/x-icon">
    
    <!-- For Apple devices -->
    <link rel="apple-touch-icon" href="/images/img%203.jpg">
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#667eea">
    
    <!-- App description -->
    <meta name="description" content="SkillSwap - Exchange Skills, Earn Credits, Learn Together. Peer-to-peer skill exchange platform.">
    
    <!-- Keywords for SEO -->
    <meta name="keywords" content="skill exchange, learn, teach, credits, swap skills, education, community">
    
    <!-- Open Graph tags for social media sharing -->
    <meta property="og:title" content="SkillSwap - Peer-to-Peer Skill Exchange">
    <meta property="og:description" content="Exchange Skills, Earn Credits, Learn Together">
    <meta property="og:type" content="website">
    
    <title>SkillSwap - Peer-to-Peer Skill Exchange</title>
    
    <style>
      /* Additional mobile-responsive styles */
      @media (max-width: 768px) {
        body {
          font-size: 14px;
        }
        
        .container, .module-card, .match-card {
          padding-left: 12px !important;
          padding-right: 12px !important;
        }
        
        button, .btn {
          width: 100%;
          margin-bottom: 8px;
          padding: 12px !important;
        }
        
        h1 {
          font-size: 24px !important;
        }
        
        h2 {
          font-size: 20px !important;
        }
        
        h3 {
          font-size: 18px !important;
        }
        
        .flex-row {
          flex-direction: column !important;
        }
        
        .grid-2-cols {
          grid-template-columns: 1fr !important;
        }
        
        /* Better touch targets */
        a, button, .clickable {
          min-height: 44px;
          min-width: 44px;
        }
        
        /* Improve spacing on mobile */
        .mb-3-mobile {
          margin-bottom: 12px;
        }
        
        /* Make cards full width on mobile */
        .card {
          margin: 8px 0 !important;
          width: 100% !important;
        }
        
        /* Table scroll on mobile */
        .table-responsive {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
      }
      
      /* Small phones (up to 480px) */
      @media (max-width: 480px) {
        .hide-on-mobile {
          display: none !important;
        }
        
        .full-width-mobile {
          width: 100% !important;
        }
        
        .stack-on-mobile {
          display: block !important;
        }
      }
      
      /* Landscape mode improvements */
      @media (max-width: 768px) and (orientation: landscape) {
        .landscape-adjust {
          max-height: 60vh;
          overflow-y: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Bootstrap JavaScript Bundle (optional, for interactive components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
