# devops/docker/docker-compose.yml
version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: skillswap-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: skillswap
    volumes:
      - mongodb_data:/data/db
    networks:
      - skillswap-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../
      dockerfile: devops/docker/backend.Dockerfile
    container_name: skillswap-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:-admin123}@mongodb:27017/skillswap?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - skillswap-network

  frontend:
    build:
      context: ../../
      dockerfile: devops/docker/frontend.Dockerfile
    container_name: skillswap-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - skillswap-network

networks:
  skillswap-network:
    driver: bridge

volumes:
  mongodb_data: