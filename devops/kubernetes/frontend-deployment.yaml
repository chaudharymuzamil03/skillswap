# devops/kubernetes/frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillswap-frontend
  namespace: skillswap
  labels:
    app: skillswap
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skillswap-frontend
  template:
    metadata:
      labels:
        app: skillswap-frontend
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: ${DOCKER_REGISTRY}/skillswap-frontend:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      restartPolicy: Always